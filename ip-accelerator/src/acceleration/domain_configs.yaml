# AI-Science Acceleration Parameters by Domain
# ai_compression_factor: how much AI compresses traditional R&D timeline (1.0-10.0)
# current_ai_maturity: how mature are AI tools in this domain today (0.0-1.0)
# acceleration_trend: is AI adoption accelerating or plateauing (0.5-2.0)

drug_discovery:
  ai_compression_factor: 8.0
  current_ai_maturity: 0.7
  acceleration_trend: 1.5
  example_breakthroughs:
    - "AlphaFold2 — protein structure prediction"
    - "Diffusion models for molecular generation (Genentech, Recursion)"
    - "Insilico Medicine — AI-discovered drug in Phase II trials"

